version: '3'

services:
  app:
    build: .
    container_name: homolog-app
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: homolog-db
    environment:
      POSTGRES_DB: tabela_receita
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./database:/docker-entrypoint-initdb.d